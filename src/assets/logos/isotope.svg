<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#C81D25"/>
  <!-- Small NJIT header -->
  <text x="100" y="52" text-anchor="middle" fill="white"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16" font-weight="700" letter-spacing="3">NJIT</text>
  <line x1="70" y1="60" x2="130" y2="60" stroke="white" stroke-width="1" opacity="0.6"/>
  <!-- ISOTOPE mark -->
  <text x="100" y="112" text-anchor="middle" fill="white"
    font-family="'Helvetica Neue', 'Arial Black', sans-serif"
    font-size="26" font-weight="900" letter-spacing="1">ISOTOPE</text>
  <!-- Atom-inspired orbit lines (nod to "isotope") -->
  <g stroke="white" stroke-width="1.5" fill="none" opacity="0.4">
    <ellipse cx="100" cy="145" rx="40" ry="14" transform="rotate(20 100 145)"/>
    <ellipse cx="100" cy="145" rx="40" ry="14" transform="rotate(-20 100 145)"/>
    <ellipse cx="100" cy="145" rx="40" ry="14"/>
  </g>
  <circle cx="100" cy="145" r="4" fill="white"/>
  <!-- Subtitle -->
  <text x="100" y="180" text-anchor="middle" fill="white"
    font-family="'Helvetica Neue', sans-serif"
    font-size="8" font-weight="600" letter-spacing="1" opacity="0.8">STUDENT AMBASSADORS</text>
</svg>
