  <rect x="156" y="54" width="30" height="7" rx="3" fill="#FCD34D" opacity="0.7"/>
  <rect x="48" y="72" width="24" height="7" rx="3" fill="#34D399" opacity="0.8"/>
  <rect x="76" y="72" width="50" height="7" rx="3" fill="#E2E8F0" opacity="0.6"/>
  <rect x="130" y="72" width="80" height="7" rx="3" fill="#60A5FA" opacity="0.7"/>
  <rect x="48" y="90" width="120" height="7" rx="3" fill="#E2E8F0" opacity="0.4"/>
  <rect x="48" y="108" width="20" height="7" rx="3" fill="#F472B6" opacity="0.8"/>
  <rect x="72" y="108" width="60" height="7" rx="3" fill="#34D399" opacity="0.7"/>
  <rect x="136" y="108" width="100" height="7" rx="3" fill="#E2E8F0" opacity="0.5"/>
  <rect x="48" y="126" width="80" height="7" rx="3" fill="#A78BFA" opacity="0.7"/>
  <rect x="132" y="126" width="40" height="7" rx="3" fill="#FCD34D" opacity="0.6"/>
  <!-- Highlighted line -->
  <rect x="0" y="144" width="380" height="16" fill="#1F2937"/>
  <rect x="48" y="147" width="24" height="7" rx="3" fill="#60A5FA" opacity="0.9"/>
  <rect x="76" y="147" width="80" height="7" rx="3" fill="#E2E8F0" opacity="0.7"/>
  <rect x="160" y="147" width="40" height="7" rx="3" fill="#34D399" opacity="0.8"/>
  <!-- More code -->
  <rect x="48" y="170" width="100" height="7" rx="3" fill="#E2E8F0" opacity="0.4"/>
  <rect x="48" y="188" width="20" height="7" rx="3" fill="#F97316" opacity="0.7"/>
  <rect x="72" y="188" width="140" height="7" rx="3" fill="#E2E8F0" opacity="0.4"/>
  <rect x="48" y="206" width="60" height="7" rx="3" fill="#A78BFA" opacity="0.6"/>
  <rect x="112" y="206" width="80" height="7" rx="3" fill="#E2E8F0" opacity="0.4"/>
  <!-- Right: AI chat panel -->
  <rect x="380" y="0" width="260" height="360" fill="#0A0A0F"/>
  <rect x="380" y="0" width="260" height="36" fill="#111118"/>
  <text x="396" y="22" fill="#A78BFA" font-family="monospace" font-size="9" font-weight="700">✦ AI Chat</text>
  <!-- AI message -->
  <rect x="392" y="50" width="200" height="60" rx="8" fill="#1A1A28"/>
  <rect x="404" y="62" width="120" height="6" rx="3" fill="#A78BFA" opacity="0.9"/>
  <rect x="404" y="74" width="176" height="5" rx="2.5" fill="#6B7280"/>
  <rect x="404" y="84" width="140" height="5" rx="2.5" fill="#6B7280"/>
  <rect x="404" y="94" width="100" height="5" rx="2.5" fill="#6B7280"/>
  <!-- User message -->
  <rect x="420" y="124" width="196" height="32" rx="8" fill="#1E2A3A"/>
  <rect x="432" y="134" width="140" height="5" rx="2.5" fill="#60A5FA" opacity="0.8"/>
  <rect x="432" y="144" width="100" height="5" rx="2.5" fill="#60A5FA" opacity="0.5"/>
  <!-- Another AI message -->
  <rect x="392" y="170" width="220" height="80" rx="8" fill="#1A1A28"/>
  <rect x="404" y="182" width="80" height="6" rx="3" fill="#34D399" opacity="0.9"/>
  <rect x="404" y="194" width="200" height="5" rx="2.5" fill="#6B7280"/>
  <rect x="404" y="204" width="160" height="5" rx="2.5" fill="#6B7280"/>
  <rect x="404" y="214" width="180" height="5" rx="2.5" fill="#6B7280"/>
  <rect x="404" y="224" width="120" height="5" rx="2.5" fill="#6B7280"/>
