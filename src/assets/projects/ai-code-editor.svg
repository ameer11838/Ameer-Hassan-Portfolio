  <rect x="392" y="310" width="228" height="36" rx="8" fill="#1A1A28" stroke="#2D2D3D" stroke-width="1"/>
  <rect x="404" y="322" width="100" height="5" rx="2.5" fill="#4B5563" opacity="0.6"/>
