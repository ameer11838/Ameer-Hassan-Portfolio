<svg viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="#0D1117"/>
  <!-- Left: code editor -->
  <rect x="0" y="0" width="380" height="360" fill="#161B22"/>
  <!-- Tab bar -->
  <rect x="0" y="0" width="380" height="36" fill="#0D1117"/>
  <rect x="12" y="8" width="90" height="20" rx="4" fill="#1F2937"/>
  <rect x="114" y="8" width="80" height="20" rx="4" fill="#161B22"/>
  <!-- Line numbers -->
  <rect x="12" y="50" width="24" height="260" fill="#0D1117"/>
  <!-- Code lines -->
  <rect x="48" y="54" width="40" height="7" rx="3" fill="#F97316" opacity="0.9"/>
